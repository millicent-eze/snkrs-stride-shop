version: '3.8'

# docker-compose runs all 4 containers together
# Think of it as the conductor of your orchestra

services:

  # ── 1. MONGODB DATABASE ──
  mongodb:
    image: mongo:6.0          # pulls official MongoDB image from Docker Hub
    container_name: journal-db
    restart: always
    volumes:
      - mongo-data:/data/db   # saves data permanently even if container restarts
    networks:
      - journal-network

  # ── 2. NODE.JS BACKEND ──
  backend:
    build: ./backend          # builds from backend/Dockerfile
    container_name: journal-backend
    restart: always
    environment:
      - MONGO_URI=mongodb://mongodb:27017/cloud-journal
      - PORT=5000
    depends_on:
      - mongodb               # waits for MongoDB to start first
    networks:
      - journal-network

  # ── 3. FRONTEND ──
  frontend:
    build: ./frontend         # builds from frontend/Dockerfile
    container_name: journal-frontend
    restart: always
    networks:
      - journal-network

  # ── 4. NGINX (Web Server / Reverse Proxy) ──
  nginx:
    image: nginx:alpine
    container_name: journal-nginx
    restart: always
    ports:
      - "80:80"               # exposes port 80 to the outside world
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    networks:
      - journal-network

# ── SHARED NETWORK ──
# All containers talk to each other on this private network
networks:
  journal-network:
    driver: bridge

# ── PERSISTENT STORAGE ──
# MongoDB data survives container restarts
volumes:
  mongo-data:
